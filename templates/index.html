<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detection AI</title>
    <meta name="description" content="Machine Learning based Emotion Detection from text.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script> <!-- Icons if needed -->
</head>
<body>
    <div class="video-background">
        <!-- Animated Background Gradient Instead of a heavy video for performance, using dynamic CSS -->
        <div class="gradient-bg"></div>
    </div>

    <div class="glass-container">
        <header>
            <h1>Emotion AI</h1>
            <p>Type any sentence and our machine learning model will detect your emotion instantly.</p>
        </header>
        
        <main>
            <div class="input-section">
                <textarea id="textInput" placeholder="I am feeling amazing today!" rows="4" maxlength="500"></textarea>
                <div class="controls">
                    <span class="char-count" id="charCount">0/500</span>
                    <button class="btn primary-btn" id="analyzeBtn">
                        <span>Analyze Emotion</span>
                        <div class="loader" id="loader"></div>
                    </button>
                </div>
            </div>

            <div class="results-section hidden" id="resultsSection">
                <div class="result-card">
                    <h2 class="emotion-title" id="emotionOutput">🤔</h2>
                    <div class="confidence-bar-container">
                        <div class="confidence-label">
                            <span>Confidence</span>
                            <span id="confidenceScore">0%</span>
                        </div>
                        <div class="progress-bg">
                            <div class="progress-fill" id="confidenceFill"></div>
                        </div>
                    </div>
                </div>

                <div class="details-accordion" id="detailsToggle">
                    <span>View Classification Probabilities</span>
                    <i class="chevron down"></i>
                </div>
                
                <div class="detailed-stats hidden" id="detailedStats">
                    <!-- Dynamic stats injected here -->
                </div>
            </div>
            <div class="error-msg hidden" id="errorMsg"></div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const textInput = document.getElementById('textInput');
            const analyzeBtn = document.getElementById('analyzeBtn');
            const resultsSection = document.getElementById('resultsSection');
            const emotionOutput = document.getElementById('emotionOutput');
            const confidenceScore = document.getElementById('confidenceScore');
            const confidenceFill = document.getElementById('confidenceFill');
            const loader = document.getElementById('loader');
            const btnText = analyzeBtn.querySelector('span');
            const errorMsg = document.getElementById('errorMsg');
            const charCount = document.getElementById('charCount');
            const detailsToggle = document.getElementById('detailsToggle');
            const detailedStats = document.getElementById('detailedStats');

            // Emotion colors mapping for UI styling
            const emotionColors = {
                'happy': 'linear-gradient(135deg, #ffdd00, #ffaa00)',
                'sad': 'linear-gradient(135deg, #4facfe, #00f2fe)',
                'angry': 'linear-gradient(135deg, #ff0844, #ffb199)',
                'fear': 'linear-gradient(135deg, #667eea, #764ba2)',
                'surprise': 'linear-gradient(135deg, #f6d365, #fda085)',
                'neutral': 'linear-gradient(135deg, #8bc6ec, #9599e2)'
            };

            textInput.addEventListener('input', () => {
                const len = textInput.value.length;
                charCount.textContent = `${len}/500`;
                if(len > 0) {
                    textInput.classList.add('has-content');
                } else {
                    textInput.classList.remove('has-content');
                }
            });

            detailsToggle.addEventListener('click', () => {
                detailedStats.classList.toggle('hidden');
                detailsToggle.classList.toggle('active');
            });

            analyzeBtn.addEventListener('click', async () => {
                const text = textInput.value.trim();
                
                if (!text) {
                    showError("Please enter some text before analyzing.");
                    return;
                }

                // Reset state
                errorMsg.classList.add('hidden');
                resultsSection.classList.add('hidden');
                btnText.style.opacity = '0';
                loader.style.display = 'block';
                analyzeBtn.disabled = true;

                try {
                    const response = await fetch('/predict', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ text: text })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || "Something went wrong.");
                    }

                    displayResults(data);

                } catch (error) {
                    showError(error.message);
                } finally {
                    btnText.style.opacity = '1';
                    loader.style.display = 'none';
                    analyzeBtn.disabled = false;
                }
            });

            function displayResults(data) {
                emotionOutput.textContent = data.emotion;
                confidenceScore.textContent = data.confidence;
                
                const percentage = parseFloat(data.confidence);
                
                // Animate progress bar
                setTimeout(() => {
                    confidenceFill.style.width = `${percentage}%`;
                    if (emotionColors[data.raw_emotion]) {
                        confidenceFill.style.background = emotionColors[data.raw_emotion];
                        emotionOutput.style.background = emotionColors[data.raw_emotion];
                        emotionOutput.style.webkitBackgroundClip = "text";
                        emotionOutput.style.webkitTextFillColor = "transparent";
                    }
                }, 100);

                // Build detailed stats
                detailedStats.innerHTML = '';
                const sortedConfidences = Object.entries(data.all_confidences)
                    .sort(([,a], [,b]) => b - a);

                sortedConfidences.forEach(([emotion, score]) => {
                    const row = document.createElement('div');
                    row.className = 'stat-row';
                    row.innerHTML = `
                        <span class="stat-name">${emotion.charAt(0).toUpperCase() + emotion.slice(1)}</span>
                        <div class="stat-bar-bg">
                            <div class="stat-bar-fill" style="width: ${score}%; background: ${emotionColors[emotion] || '#fff'}"></div>
                        </div>
                        <span class="stat-val">${score}%</span>
                    `;
                    detailedStats.appendChild(row);
                });

                resultsSection.classList.remove('hidden');
            }

            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
